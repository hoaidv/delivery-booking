spring.application.name=dbworker

spring.datasource.url=jdbc:postgresql://localhost:5432/delivery_booking
spring.datasource.username=delivery
spring.datasource.password=delivery

kafka.bootstrap.servers=localhost:9092
kafka.topic.delivery-opportunity-claims=db.delivery.booking.events

kafka.consumer.group-id=dbworker
kafka.consumer.instances=1
kafka.consumer.max-poll-records=500
kafka.consumer.poll-timeout=100ms
kafka.consumer.commit-on-successful-claim=true

spring.data.redis.host=localhost
spring.data.redis.port=6379

cache.delivery.opportunity-ttl=60s
cache.delivery.slot-ttl=15s
