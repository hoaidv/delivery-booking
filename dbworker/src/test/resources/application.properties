spring.profiles.active=test

spring.datasource.url=jdbc:h2:mem:delivery_booking_worker;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql

kafka.bootstrap.servers=localhost:9092
kafka.topic.delivery-opportunity-claims=db.delivery.booking.events
kafka.consumer.group-id=dbworker-test
kafka.consumer.instances=1
kafka.consumer.max-poll-records=500

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
